<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest Latihan — Program 365 Hari</title>
<meta name="description" content="Today-list latihan harian selama setahun, lengkap dengan level, rank, dan pengecekan progres.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14121C;
    --panel: #1D1A29;
    --panel-2: #262236;
    --line: rgba(243,241,247,0.10);
    --ink: #F3F1F7;
    --muted: #9C97B3;
    --teal: #45E0C2;
    --amber: #FFB454;
    --coral: #FF6F6F;
    --blue: #8C8CFF;
    --radius: 16px;
    --maxw: 760px;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(69,224,194,0.08), transparent 60%),
      var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .wrap{ max-width: var(--maxw); margin: 0 auto; padding: 0 18px; }
  h1,h2,h3{ font-family:'Sora', sans-serif; margin:0; }
  button{ font-family:'Sora', sans-serif; cursor:pointer; }
  :focus-visible{ outline: 2px solid var(--teal); outline-offset: 2px; }

  /* ---------- loading ---------- */
  #loading{
    display:flex; align-items:center; justify-content:center;
    min-height: 100vh; font-family:'JetBrains Mono', monospace;
    color: var(--muted); font-size: 13px; letter-spacing:.05em;
  }
  #app{ display:none; }

  /* ---------- HUD ---------- */
  .hud{
    padding: 22px 0 16px;
  }
  .hud-top{ display:flex; align-items:center; gap:16px; margin-bottom: 14px; }
  .emblem{
    width: 56px; height:56px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 22px; flex-shrink:0;
    background: var(--panel);
    border: 2px solid var(--rank-color, var(--teal));
    box-shadow: 0 0 0 0 rgba(69,224,194,0.0);
    position: relative;
    transition: box-shadow .4s ease;
  }
  .emblem.pulse{ animation: emblemPulse .9s ease; }
  @keyframes emblemPulse{
    0%{ box-shadow: 0 0 0 0 var(--rank-color); }
    60%{ box-shadow: 0 0 0 14px transparent; }
    100%{ box-shadow: 0 0 0 0 transparent; }
  }
  .emblem .lvl{
    position:absolute; bottom:-7px; right:-6px;
    background: var(--rank-color, var(--teal));
    color:#14121C; font-family:'JetBrains Mono', monospace;
    font-weight:600; font-size:11px;
    border-radius: 999px; padding: 1px 6px;
  }
  .hud-info{ flex:1; min-width:0; }
  .hud-rank{ font-weight:700; font-size:16px; }
  .hud-rank span{ color: var(--rank-color, var(--teal)); }
  .bar-row{ display:flex; align-items:center; gap:8px; margin-top:6px; }
  .bar-track{
    flex:1; height:8px; border-radius:999px;
    background: var(--panel-2); overflow:hidden;
  }
  .bar-fill{
    height:100%; border-radius:999px;
    background: linear-gradient(90deg, var(--teal), var(--blue));
    width:0%; transition: width .5s ease;
  }
  .bar-label{
    font-family:'JetBrains Mono', monospace; font-size:11px; color: var(--muted);
    white-space:nowrap;
  }
  .year-row{ display:flex; align-items:center; gap:8px; margin-top:8px; }
  .year-row .bar-fill{ background: linear-gradient(90deg, var(--amber), var(--coral)); }

  /* ---------- toasts ---------- */
  #toast-stack{
    position: fixed; top: 16px; right:16px; z-index: 50;
    display:flex; flex-direction:column; gap:8px; max-width: 280px;
  }
  .toast{
    background: var(--panel); border:1px solid var(--line);
    border-left: 3px solid var(--teal);
    border-radius: 10px; padding: 10px 14px;
    font-size: 13px;
    animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards;
  }
  .toast.level{ border-left-color: var(--amber); font-weight:600; }
  @keyframes toastIn{ from{ opacity:0; transform: translateX(20px); } to{ opacity:1; transform:none; } }
  @keyframes toastOut{ to{ opacity:0; transform: translateX(20px); } }

  /* ---------- quest card ---------- */
  .quest-card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 24px 22px;
    margin-top: 8px;
  }
  .quest-badge{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing:.08em; text-transform:uppercase;
    color: var(--teal); margin-bottom: 8px; display:block;
  }
  .quest-title{ font-size: 21px; margin-bottom: 4px; }
  .quest-sub{ color: var(--muted); font-size: 13px; margin-bottom: 18px; }

  .ex-list{ display:flex; flex-direction:column; gap:10px; margin-bottom: 18px; }
  .ex-item{
    display:flex; gap:12px; align-items:flex-start;
    background: var(--panel-2);
    border: 1px solid transparent;
    border-radius: 10px; padding: 12px 14px;
    cursor:pointer; transition: border-color .15s ease, opacity .15s ease;
  }
  .ex-item:hover{ border-color: var(--line); }
  .ex-item input{ margin-top:3px; accent-color: var(--teal); width:17px; height:17px; flex-shrink:0; }
  .ex-item.checked{ opacity:.55; }
  .ex-item.checked .ex-name{ text-decoration: line-through; }
  .ex-name{ font-weight:600; font-size:14.5px; display:block; }
  .ex-detail{ color: var(--muted); font-size:13px; display:block; margin-top:2px; }

  .off-msg{
    background: var(--panel-2); border-radius:10px; padding:16px 16px; margin-bottom:18px;
    color: var(--muted); font-size: 14px;
  }

  .quest-actions{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .btn-primary{
    background: var(--teal); color:#0E1614; border:none;
    font-weight:700; font-size:14.5px; padding:12px 20px;
    border-radius:999px; transition: transform .15s ease, opacity .15s ease;
  }
  .btn-primary:disabled{ opacity:.35; cursor:not-allowed; }
  .btn-primary:not(:disabled):hover{ transform: translateY(-1px); }
  .btn-ghost{
    background:none; border:1px solid var(--line); color: var(--muted);
    font-size:13px; padding: 11px 16px; border-radius:999px;
    transition: border-color .15s ease, color .15s ease;
  }
  .btn-ghost:hover{ border-color: var(--coral); color: var(--coral); }
  .hint{ font-family:'JetBrains Mono', monospace; font-size:11px; color: var(--muted); width:100%; }

  /* ---------- stats ---------- */
  .stats-grid{
    display:grid; grid-template-columns: repeat(4,1fr); gap:10px;
    margin-top: 22px;
  }
  .stat-tile{
    background: var(--panel); border:1px solid var(--line); border-radius:12px;
    padding: 12px 10px; text-align:center;
  }
  .stat-tile .v{ font-family:'JetBrains Mono', monospace; font-weight:600; font-size:17px; }
  .stat-tile .l{ font-size:10.5px; color: var(--muted); margin-top:2px; }

  /* ---------- achievements ---------- */
  .section-label{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color: var(--muted); margin: 28px 0 10px;
  }
  .badges-grid{ display:grid; grid-template-columns: repeat(2,1fr); gap:10px; }
  .badge{
    background: var(--panel); border:1px solid var(--line); border-radius:12px;
    padding: 12px 14px; display:flex; gap:10px; align-items:center;
    opacity:.4;
  }
  .badge.unlocked{ opacity:1; border-color: rgba(255,180,84,0.4); }
  .badge .ic{ font-size: 20px; }
  .badge .label{ font-size:13px; font-weight:600; }
  .badge .desc{ font-size:11px; color: var(--muted); }

  /* ---------- heatmap ---------- */
  .heatmap-scroll{ overflow-x:auto; padding-bottom:6px; }
  .heatmap{
    display:grid; grid-template-rows: repeat(7, 9px); grid-auto-flow: column;
    grid-auto-columns: 9px; gap:3px; width: max-content;
  }
  .cell{ width:9px; height:9px; border-radius:2px; background: rgba(243,241,247,0.06); }
  .cell.done-workout{ background: var(--teal); }
  .cell.done-rest{ background: var(--blue); }
  .cell.done-off{ background: #4B4760; }
  .cell.skipped{ background: var(--coral); opacity:.6; }
  .cell.today{ box-shadow: 0 0 0 2px var(--amber) inset; }
  .legend{ display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; font-size:11px; color: var(--muted); }
  .legend span{ display:inline-flex; align-items:center; gap:5px; }
  .legend i{ width:8px; height:8px; border-radius:2px; display:inline-block; }

  /* ---------- finished ---------- */
  .finished{ text-align:center; padding: 30px 10px; }
  .finished .big{ font-size: 44px; }
  .finished h2{ font-size: 24px; margin: 10px 0 6px; }
  .finished p{ color: var(--muted); font-size:14px; }

  footer{
    margin-top: 36px; text-align:center;
  }
  .reset-btn{
    background:none; border:none; color: var(--muted);
    font-family:'JetBrains Mono', monospace; font-size:11px;
    text-decoration: underline; cursor:pointer;
  }
  .reset-btn:hover{ color: var(--coral); }
  .save-note{
    font-family:'JetBrains Mono', monospace; font-size:10.5px; color: var(--muted);
    margin-bottom: 8px;
  }
  .footer-actions{ display:flex; gap:18px; justify-content:center; flex-wrap:wrap; }

  /* ---------- foto progres ---------- */
  .photo-section{ margin-top: 30px; }
  .btn-photo{
    background: var(--panel-2); border:1px solid var(--line); color: var(--ink);
    font-weight:600; font-size:13.5px; padding:13px 16px; border-radius:12px;
    width:100%; display:flex; align-items:center; justify-content:center; gap:8px;
    transition: border-color .15s ease, transform .15s ease;
  }
  .btn-photo:hover{ border-color: var(--teal); transform: translateY(-1px); }
  .photo-gallery{
    display:grid; grid-template-columns: repeat(3,1fr); gap:8px; margin-top:12px;
  }
  .photo-thumb{
    position:relative; aspect-ratio: 3 / 4; border-radius:10px; overflow:hidden;
    cursor:pointer; background: var(--panel-2); border:1px solid var(--line);
  }
  .photo-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .photo-thumb span{
    position:absolute; bottom:0; left:0; right:0;
    background: rgba(20,18,28,0.78); font-family:'JetBrains Mono', monospace;
    font-size:10px; padding:3px 4px; text-align:center; color: var(--ink);
  }
  .photo-empty{
    grid-column: 1 / -1; color: var(--muted); font-size:12.5px; text-align:center;
    padding: 18px 8px; line-height:1.5;
  }
  .lightbox{
    position: fixed; inset:0; background: rgba(10,9,14,0.92); z-index:60;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .lightbox-inner{ max-width: 360px; width:100%; }
  .lightbox-inner img{ width:100%; border-radius:14px; display:block; max-height:65vh; object-fit:contain; background: var(--panel); }
  .lightbox-actions{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:14px; gap:8px; flex-wrap:wrap;
  }
  .lightbox-actions span{ font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--muted); }

  @media (max-width: 480px){
    .stats-grid{ grid-template-columns: repeat(2,1fr); }
    .badges-grid{ grid-template-columns: 1fr; }
  }
  @media (prefers-reduced-motion: reduce){
    .toast, .emblem.pulse, .bar-fill{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div id="loading">memuat progres…</div>
<div id="toast-stack" aria-live="polite"></div>

<div id="app">
  <div class="wrap">

    <div class="hud">
      <div class="hud-top">
        <div class="emblem" id="emblem"><span id="emblem-icon">🌱</span><span class="lvl" id="lvl-badge">1</span></div>
        <div class="hud-info">
          <div class="hud-rank">Level <span id="lvl-text">1</span> · <span id="rank-text">Pemula</span></div>
          <div class="bar-row">
            <div class="bar-track"><div class="bar-fill" id="xp-fill"></div></div>
            <div class="bar-label" id="xp-label">0 / 100 XP</div>
          </div>
        </div>
      </div>
      <div class="year-row">
        <div class="bar-track"><div class="bar-fill" id="year-fill"></div></div>
        <div class="bar-label" id="year-label">Hari 1 / 365</div>
      </div>
    </div>

    <div id="quest-area"></div>

    <div class="stats-grid">
      <div class="stat-tile"><div class="v" id="stat-streak">0</div><div class="l">🔥 STREAK</div></div>
      <div class="stat-tile"><div class="v" id="stat-best">0</div><div class="l">TERLAMA</div></div>
      <div class="stat-tile"><div class="v" id="stat-sessions">0</div><div class="l">SESI SELESAI</div></div>
      <div class="stat-tile"><div class="v" id="stat-skipped">0</div><div class="l">DILEWATI</div></div>
    </div>

    <div class="section-label">Lencana</div>
    <div class="badges-grid" id="badges-grid"></div>

    <div class="section-label">Peta Setahun</div>
    <div class="heatmap-scroll"><div class="heatmap" id="heatmap"></div></div>
    <div class="legend">
      <span><i style="background:var(--teal)"></i>Latihan</span>
      <span><i style="background:var(--blue)"></i>Pemulihan</span>
      <span><i style="background:#4B4760"></i>Libur</span>
      <span><i style="background:var(--coral)"></i>Dilewati</span>
    </div>

    <div class="section-label">Cek Progress via Kamera</div>
    <div class="photo-section">
      <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none">
      <button class="btn-photo" id="take-photo-btn" type="button">📷 Ambil Foto Progress Hari Ini</button>
      <div class="photo-gallery" id="photo-gallery"><div class="photo-empty">memuat foto…</div></div>
    </div>

    <footer>
      <div class="save-note" id="save-indicator">disimpan otomatis di perangkat ini</div>
      <div class="footer-actions">
        <button class="reset-btn" id="sound-toggle" type="button">🔊 suara: aktif</button>
        <button class="reset-btn" id="reset-btn" type="button">reset progres</button>
      </div>
    </footer>
  </div>
</div>

<div class="lightbox" id="lightbox" style="display:none">
  <div class="lightbox-inner">
    <img id="lightbox-img" alt="Foto progress">
    <div class="lightbox-actions">
      <span id="lightbox-day"></span>
      <button class="btn-ghost" id="lightbox-delete" type="button">Hapus</button>
      <button class="btn-ghost" id="lightbox-close" type="button">Tutup</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var DAY_TEMPLATES = [
    { day:'Sabtu', type:'workout', label:'Sesi C — Full Body Challenge', items:[
      {n:'Decline Push-up', d:'3 set × 10 repetisi — kaki di kasur/kursi, fokus dada bagian atas'},
      {n:'Single-Arm Dumbbell Row', d:'3 set × 12 repetisi/sisi'},
      {n:'Bulgarian Split Squat', d:'3 set × 10 repetisi/kaki — fokus paha estetis'},
      {n:'Dumbbell Russian Twist', d:'3 set × 15 putaran kanan-kiri — fokus perut samping'}
    ]},
    { day:'Minggu', type:'rest', label:'Persiapan Minggu Depan', items:[
      {n:'Evaluasi progres', d:'Lihat lagi latihan minggu ini'},
      {n:'Siapkan alat', d:'Dumbbell & push-up bar buat minggu depan'},
      {n:'Istirahat penuh', d:'Nggak perlu olahraga hari ini'}
    ]},
    { day:'Senin', type:'workout', label:'Sesi A — Dada, Punggung, Kaki', items:[
      {n:'Regular Push-up', d:'3 set × 10–15 repetisi — fokus dada & lengan belakang'},
      {n:'Single-Arm Dumbbell Row', d:'3 set × 12 repetisi (kanan-kiri bergantian) — fokus otot punggung'},
      {n:'Goblet Squat', d:'3 set × 15 repetisi — pegang 1 dumbbell di dada, fokus otot paha'},
      {n:'Calf Raises (Jinjit)', d:'3 set × 20 repetisi — bisa sambil pegang dumbbell, fokus otot betis'}
    ]},
    { day:'Selasa', type:'rest', label:'Pemulihan Otot', items:[
      {n:'Tidur cukup', d:'Minimal 7 jam malam ini'},
      {n:'Protein cukup', d:'Penuhi kebutuhan protein harian'},
      {n:'Stretching ringan', d:'5–10 menit'}
    ]},
    { day:'Rabu', type:'workout', label:'Sesi B — Bahu, Lengan, Perut', items:[
      {n:'Pike Push-up', d:'3 set × 8–12 repetisi — pinggul naik bentuk V terbalik, fokus bahu lebar'},
      {n:'Dumbbell Single-Arm Overhead Press', d:'3 set × 10 repetisi/sisi — fokus kekuatan bahu'},
      {n:'Dumbbell Hammer Curl', d:'3 set × 12 repetisi/sisi — fokus otot lengan depan/bisep'},
      {n:'Plank', d:'3 set × tahan 45–60 detik — fokus otot perut'}
    ]},
    { day:'Kamis', type:'rest', label:'Pemulihan Otot', items:[
      {n:'Tidur cukup', d:'Minimal 7 jam malam ini'},
      {n:'Stretching ringan', d:'Bantu pemulihan otot'}
    ]},
    { day:'Jumat', type:'off', label:'Libur Mutlak', items:[] }
  ];

  var RANKS = [
    { min:1, max:4, name:'Pemula', icon:'🌱', color:'#8FD694' },
    { min:5, max:9, name:'Perunggu', icon:'🥉', color:'#C9885B' },
    { min:10, max:14, name:'Perak', icon:'🥈', color:'#C7D0D9' },
    { min:15, max:19, name:'Emas', icon:'🥇', color:'#E8C24B' },
    { min:20, max:29, name:'Platinum', icon:'💎', color:'#45E0C2' },
    { min:30, max:39, name:'Diamond', icon:'💠', color:'#8C8CFF' },
    { min:40, max:49, name:'Master', icon:'🔥', color:'#FF8A5B' },
    { min:50, max:9999, name:'Legend', icon:'👑', color:'#FFD76A' }
  ];

  var ACHIEVEMENTS = [
    { id:'day1', label:'Langkah Pertama', desc:'Selesaikan hari pertama', cond:function(s){ return s.history.some(function(h){return h.day===1;}); } },
    { id:'day7', label:'Seminggu Tuntas', desc:'Sampai hari ke-7', cond:function(s){ return s.history.some(function(h){return h.day===7;}); } },
    { id:'day30', label:'30 Hari Konsisten', desc:'Sampai hari ke-30', cond:function(s){ return s.history.some(function(h){return h.day===30;}); } },
    { id:'day100', label:'Seratus Hari', desc:'Sampai hari ke-100', cond:function(s){ return s.history.some(function(h){return h.day===100;}); } },
    { id:'day183', label:'Setengah Tahun', desc:'Sampai hari ke-183', cond:function(s){ return s.history.some(function(h){return h.day===183;}); } },
    { id:'day365', label:'Tuntas Satu Tahun', desc:'Selesaikan 365 hari', cond:function(s){ return s.history.some(function(h){return h.day===365;}); } },
    { id:'streak10', label:'Streak 10x', desc:'10 sesi latihan beruntun', cond:function(s){ return s.longestStreak>=10; } },
    { id:'streak25', label:'Streak 25x', desc:'25 sesi latihan beruntun', cond:function(s){ return s.longestStreak>=25; } },
    { id:'level10', label:'Level 10', desc:'Capai Level 10', cond:function(s,lvl){ return lvl>=10; } },
    { id:'level25', label:'Level 25', desc:'Capai Level 25', cond:function(s,lvl){ return lvl>=25; } }
  ];

  var DEFAULT_STATE = {
    currentDay: 1,
    xp: 0,
    currentStreak: 0,
    longestStreak: 0,
    totalSessionsCompleted: 0,
    totalDaysSkipped: 0,
    history: [],
    todayChecks: [],
    achievements: [],
    soundOn: true
  };

  var state = null;
  var STORAGE_KEY = 'workout-progress';
  var saveTimer = null;

  function getDayTemplate(dayNum){
    return DAY_TEMPLATES[(dayNum - 1) % 7];
  }

  function reqForLevel(level){ return 100 + (level - 1) * 40; }

  function getLevelInfo(xp){
    var level = 1, remaining = xp, req = reqForLevel(1);
    while (remaining >= req){
      remaining -= req;
      level++;
      req = reqForLevel(level);
    }
    return { level: level, into: remaining, need: req };
  }

  function getRank(level){
    for (var i=0;i<RANKS.length;i++){
      if (level >= RANKS[i].min && level <= RANKS[i].max) return RANKS[i];
    }
    return RANKS[RANKS.length-1];
  }

  function showToast(msg, isLevel){
    var stack = document.getElementById('toast-stack');
    var el = document.createElement('div');
    el.className = 'toast' + (isLevel ? ' level' : '');
    el.textContent = msg;
    stack.appendChild(el);
    setTimeout(function(){ el.remove(); }, 3000);
  }

  /* ---------- sound effects (disintesis, nggak butuh file audio) ---------- */
  var audioCtx = null;
  function ensureAudio(){
    if (!state || !state.soundOn) return null;
    try{
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    } catch(e){ return null; }
  }
  function tone(ctx, freq, t0, dur, type, peak){
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(peak || 0.16, t0 + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.03);
  }
  function playClick(){
    var ctx = ensureAudio(); if (!ctx) return;
    tone(ctx, 720, ctx.currentTime, 0.08, 'sine', 0.10);
  }
  function playComplete(){
    var ctx = ensureAudio(); if (!ctx) return;
    var t = ctx.currentTime;
    [523.25, 659.25, 783.99].forEach(function(f, i){ tone(ctx, f, t + i * 0.08, 0.18, 'triangle', 0.14); });
  }
  function playLevelUp(){
    var ctx = ensureAudio(); if (!ctx) return;
    var t = ctx.currentTime;
    [523.25, 659.25, 783.99, 1046.5].forEach(function(f, i){ tone(ctx, f, t + i * 0.09, 0.30, 'triangle', 0.17); });
  }
  function playAchievement(){
    var ctx = ensureAudio(); if (!ctx) return;
    var t = ctx.currentTime;
    tone(ctx, 784, t, 0.12, 'square', 0.09);
    tone(ctx, 1046.5, t + 0.1, 0.24, 'square', 0.11);
  }
  function playSkip(){
    var ctx = ensureAudio(); if (!ctx) return;
    tone(ctx, 196, ctx.currentTime, 0.22, 'sine', 0.09);
  }
  function playShutter(){
    var ctx = ensureAudio(); if (!ctx) return;
    var t = ctx.currentTime;
    tone(ctx, 1300, t, 0.03, 'square', 0.07);
    tone(ctx, 950, t + 0.05, 0.04, 'square', 0.07);
  }

  async function loadState(){
    try{
      var res = await window.storage.get(STORAGE_KEY, false);
      if (res && res.value){
        var parsed = JSON.parse(res.value);
        state = Object.assign({}, DEFAULT_STATE, parsed);
      } else {
        state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      }
    } catch(e){
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
  }

  function persist(){
    // Simpan langsung tanpa delay, supaya progres nggak hilang walau window ditutup cepat.
    clearTimeout(saveTimer);
    (async function(){
      try{
        await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
        var el = document.getElementById('save-indicator');
        if (el){
          el.textContent = 'tersimpan ✓';
          clearTimeout(saveTimer);
          saveTimer = setTimeout(function(){ el.textContent = 'disimpan otomatis di perangkat ini'; }, 1500);
        }
      } catch(e){
        var el2 = document.getElementById('save-indicator');
        if (el2) el2.textContent = 'gagal menyimpan, coba lagi';
      }
    })();
  }

  // Jaring pengaman tambahan: simpan lagi saat tab disembunyikan / sebelum ditutup.
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'hidden' && state) persist();
  });
  window.addEventListener('pagehide', function(){
    if (state) persist();
  });

  function checkAchievements(levelAfter){
    var newly = [];
    ACHIEVEMENTS.forEach(function(a){
      if (state.achievements.indexOf(a.id) === -1 && a.cond(state, levelAfter)){
        state.achievements.push(a.id);
        showToast('🏅 Lencana baru: ' + a.label, false);
        newly.push(a.id);
      }
    });
    return newly;
  }

  function processDay(status){
    var dayNum = state.currentDay;
    var tmpl = getDayTemplate(dayNum);
    var prevXp = state.xp;
    var gain = 0;

    if (status === 'completed'){
      if (tmpl.type === 'workout'){
        gain = tmpl.items.length * 5 + 15 + Math.min(state.currentStreak * 2, 20);
        state.currentStreak++;
        state.totalSessionsCompleted++;
      } else if (tmpl.type === 'rest'){
        gain = tmpl.items.length * 5 + 10;
      } else {
        gain = 10;
      }
      state.xp += gain;
    } else {
      if (tmpl.type === 'workout') state.currentStreak = 0;
      state.totalDaysSkipped++;
    }

    state.longestStreak = Math.max(state.longestStreak, state.currentStreak);
    state.history.push({ day: dayNum, dayName: tmpl.day, type: tmpl.type, status: status });
    state.todayChecks = [];

    var lvlBefore = getLevelInfo(prevXp).level;
    var lvlAfter = getLevelInfo(state.xp).level;

    if (gain > 0) showToast('+' + gain + ' XP', false);
    if (status === 'completed') playComplete(); else playSkip();

    if (lvlAfter > lvlBefore){
      var rank = getRank(lvlAfter);
      showToast('🎉 Naik ke Level ' + lvlAfter + ' — ' + rank.name + '!', true);
      var em = document.getElementById('emblem');
      em.classList.remove('pulse'); void em.offsetWidth; em.classList.add('pulse');
      setTimeout(playLevelUp, 90);
    }

    var newBadges = checkAchievements(lvlAfter);
    if (newBadges.length > 0) setTimeout(playAchievement, 180);
    state.currentDay++;
    persist();
    render();
  }

  function skipDay(){
    var tmpl = getDayTemplate(state.currentDay);
    var confirmMsg = tmpl.type === 'workout'
      ? 'Yakin mau lewati hari ini? Streak balik ke 0, tapi progres total kamu tetap kesimpen. Lanjut?'
      : 'Lewati hari ini dan lanjut ke hari berikutnya?';
    if (window.confirm(confirmMsg)) processDay('skipped');
  }

  function renderHud(){
    var info = getLevelInfo(state.xp);
    var rank = getRank(info.level);
    document.documentElement.style.setProperty('--rank-color', rank.color);
    document.getElementById('emblem-icon').textContent = rank.icon;
    document.getElementById('lvl-badge').textContent = info.level;
    document.getElementById('lvl-text').textContent = info.level;
    document.getElementById('rank-text').textContent = rank.name;
    document.getElementById('xp-fill').style.width = Math.round((info.into / info.need) * 100) + '%';
    document.getElementById('xp-label').textContent = info.into + ' / ' + info.need + ' XP';

    var dayShown = Math.min(state.currentDay, 365);
    document.getElementById('year-fill').style.width = Math.round((dayShown / 365) * 100) + '%';
    document.getElementById('year-label').textContent = 'Hari ' + dayShown + ' / 365';
  }

  function renderQuest(){
    var area = document.getElementById('quest-area');

    if (state.currentDay > 365){
      area.innerHTML =
        '<div class="quest-card finished">' +
          '<div class="big">🏆</div>' +
          '<h2>Program 365 Hari Tuntas!</h2>' +
          '<p>Kamu nyelesain satu tahun penuh latihan. Tetap lanjut atau istirahat dulu — keduanya sah.</p>' +
        '</div>';
      return;
    }

    var dayNum = state.currentDay;
    var tmpl = getDayTemplate(dayNum);
    var weekNum = Math.ceil(dayNum / 7);

    var html = '<div class="quest-card">' +
      '<span class="quest-badge">HARI KE-' + dayNum + ' / 365 · ' + tmpl.day.toUpperCase() + ' · MINGGU ' + weekNum + '</span>' +
      '<h2 class="quest-title">' + tmpl.label + '</h2>';

    if (tmpl.type === 'off'){
      html += '<div class="off-msg">Libur mutlak — sesuai jadwalmu, istirahat total dari olahraga hari ini.</div>' +
        '<div class="quest-actions"><button class="btn-primary" id="complete-btn" type="button">Tandai Hari Ini Selesai</button></div>';
    } else {
      if (!state.todayChecks || state.todayChecks.length !== tmpl.items.length){
        state.todayChecks = tmpl.items.map(function(){ return false; });
      }
      html += '<p class="quest-sub">Centang tiap item yang sudah kamu selesaikan hari ini.</p><div class="ex-list" id="ex-list">';
      tmpl.items.forEach(function(it, idx){
        var checked = state.todayChecks[idx];
        html += '<label class="ex-item' + (checked ? ' checked' : '') + '">' +
          '<input type="checkbox" data-idx="' + idx + '"' + (checked ? ' checked' : '') + '>' +
          '<span><span class="ex-name">' + it.n + '</span><span class="ex-detail">' + it.d + '</span></span>' +
          '</label>';
      });
      var allChecked = state.todayChecks.every(Boolean);
      html += '</div><div class="quest-actions">' +
        '<button class="btn-primary" id="complete-btn" type="button"' + (allChecked ? '' : ' disabled') + '>Selesaikan Hari Ini</button>' +
        '<button class="btn-ghost" id="skip-btn" type="button">Lewati hari ini</button>' +
        (allChecked ? '' : '<span class="hint">centang semua item dulu buat menyelesaikan</span>') +
        '</div>';
    }
    html += '</div>';
    area.innerHTML = html;

    var exList = document.getElementById('ex-list');
    if (exList){
      exList.addEventListener('change', function(e){
        var idx = e.target.getAttribute('data-idx');
        if (idx === null) return;
        state.todayChecks[idx] = e.target.checked;
        if (e.target.checked) playClick();
        persist();
        renderQuest();
      });
    }
    var completeBtn = document.getElementById('complete-btn');
    if (completeBtn) completeBtn.addEventListener('click', function(){ processDay('completed'); });
    var skipBtn = document.getElementById('skip-btn');
    if (skipBtn) skipBtn.addEventListener('click', skipDay);
  }

  function renderStats(){
    document.getElementById('stat-streak').textContent = state.currentStreak;
    document.getElementById('stat-best').textContent = state.longestStreak;
    document.getElementById('stat-sessions').textContent = state.totalSessionsCompleted;
    document.getElementById('stat-skipped').textContent = state.totalDaysSkipped;
  }

  function renderBadges(){
    var grid = document.getElementById('badges-grid');
    grid.innerHTML = ACHIEVEMENTS.map(function(a){
      var unlocked = state.achievements.indexOf(a.id) !== -1;
      return '<div class="badge' + (unlocked ? ' unlocked' : '') + '">' +
        '<span class="ic">' + (unlocked ? '🏅' : '🔒') + '</span>' +
        '<span><span class="label">' + a.label + '</span><span class="desc">' + a.desc + '</span></span>' +
        '</div>';
    }).join('');
  }

  function renderHeatmap(){
    var map = document.getElementById('heatmap');
    var historyByDay = {};
    state.history.forEach(function(h){ historyByDay[h.day] = h; });

    var html = '';
    for (var d = 1; d <= 365; d++){
      var cls = 'cell';
      var h = historyByDay[d];
      if (h){
        if (h.status === 'skipped') cls += ' skipped';
        else if (h.type === 'workout') cls += ' done-workout';
        else if (h.type === 'rest') cls += ' done-rest';
        else cls += ' done-off';
      }
      if (d === state.currentDay) cls += ' today';
      html += '<div class="' + cls + '" title="Hari ' + d + (h ? ' — ' + h.status : '') + '"></div>';
    }
    map.innerHTML = html;
  }

  function render(){
    renderHud();
    renderQuest();
    renderStats();
    renderBadges();
    renderHeatmap();
  }

  /* ---------- foto progres via kamera ---------- */
  function resizeImageFile(file, maxW, quality){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onerror = function(){ reject(new Error('gagal baca file')); };
      reader.onload = function(){
        var img = new Image();
        img.onerror = function(){ reject(new Error('gagal muat gambar')); };
        img.onload = function(){
          var scale = Math.min(1, maxW / img.width);
          var w = Math.max(1, Math.round(img.width * scale));
          var h = Math.max(1, Math.round(img.height * scale));
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  async function loadGallery(){
    var gallery = document.getElementById('photo-gallery');
    gallery.innerHTML = '<div class="photo-empty">memuat foto…</div>';
    try{
      var listRes = await window.storage.list('progress-photo:', false);
      var keys = (listRes && listRes.keys) || [];
      var days = keys.map(function(k){ return parseInt(k.split(':')[1], 10); })
        .filter(function(n){ return !isNaN(n); })
        .sort(function(a, b){ return b - a; });
      if (days.length === 0){
        gallery.innerHTML = '<div class="photo-empty">Belum ada foto progress. Ambil foto pertamamu di atas!</div>';
        return;
      }
      var topDays = days.slice(0, 9);
      var html = '';
      for (var i = 0; i < topDays.length; i++){
        var d = topDays[i];
        try{
          var r = await window.storage.get('progress-photo:' + d, false);
          if (r && r.value){
            html += '<div class="photo-thumb" data-day="' + d + '"><img src="' + r.value + '" alt="Foto progress hari ' + d + '"><span>Hari ' + d + '</span></div>';
          }
        } catch(e){ /* lewati foto yang gagal dimuat */ }
      }
      gallery.innerHTML = html || '<div class="photo-empty">Belum ada foto progress.</div>';
    } catch(e){
      gallery.innerHTML = '<div class="photo-empty">Galeri foto nggak bisa dimuat sekarang.</div>';
    }
  }

  var photoInput = document.getElementById('photo-input');
  document.getElementById('take-photo-btn').addEventListener('click', function(){
    if (!window.FileReader){
      showToast('Fitur foto nggak didukung di browser ini', false);
      return;
    }
    photoInput.value = '';
    photoInput.click();
  });

  photoInput.addEventListener('change', async function(e){
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    playShutter();
    try{
      var dataUrl = await resizeImageFile(file, 480, 0.7);
      var key = 'progress-photo:' + state.currentDay;
      var existing = null;
      try{ existing = await window.storage.get(key, false); } catch(err){ existing = null; }
      if (existing && existing.value){
        if (!window.confirm('Sudah ada foto buat hari ini. Ganti dengan foto baru?')) return;
      }
      await window.storage.set(key, dataUrl, false);
      showToast('📸 Foto progress hari ke-' + state.currentDay + ' disimpan', false);
      loadGallery();
    } catch(err){
      showToast('Gagal menyimpan foto, coba lagi', false);
    }
  });

  document.getElementById('photo-gallery').addEventListener('click', function(e){
    var thumb = e.target.closest('.photo-thumb');
    if (!thumb) return;
    var day = thumb.getAttribute('data-day');
    var img = thumb.querySelector('img');
    openLightbox(day, img.src);
  });

  function openLightbox(day, src){
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-day').textContent = 'Hari ke-' + day;
    document.getElementById('lightbox').setAttribute('data-day', day);
    document.getElementById('lightbox').style.display = 'flex';
  }
  function closeLightbox(){
    document.getElementById('lightbox').style.display = 'none';
  }
  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', function(e){
    if (e.target.id === 'lightbox') closeLightbox();
  });
  document.getElementById('lightbox-delete').addEventListener('click', async function(){
    var day = document.getElementById('lightbox').getAttribute('data-day');
    if (!window.confirm('Hapus foto hari ke-' + day + '?')) return;
    try{
      await window.storage.delete('progress-photo:' + day, false);
      showToast('Foto dihapus', false);
    } catch(e){ showToast('Gagal menghapus foto', false); }
    closeLightbox();
    loadGallery();
  });

  document.getElementById('sound-toggle').addEventListener('click', function(){
    state.soundOn = !state.soundOn;
    this.textContent = state.soundOn ? '🔊 suara: aktif' : '🔇 suara: nonaktif';
    persist();
    if (state.soundOn) playClick();
  });

  document.getElementById('reset-btn').addEventListener('click', function(){
    if (window.confirm('Yakin mau reset semua progres? Ini nggak bisa dibatalin.')){
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      persist();
      render();
    }
  });

  (async function init(){
    await loadState();
    document.getElementById('sound-toggle').textContent = state.soundOn ? '🔊 suara: aktif' : '🔇 suara: nonaktif';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
    loadGallery();
  })();
})();
</script>
